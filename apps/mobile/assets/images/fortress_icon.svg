<svg viewBox="0 0 34 32" xmlns="http://www.w3.org/2000/svg">
  <!-- Fortress icon — white on transparent, for use on colored backgrounds -->

  <!-- Main tower body -->
  <rect x="8" y="10" width="18" height="21" rx="1.5" fill="white" opacity="0.95"/>

  <!-- Tower battlements (3 merlons) -->
  <rect x="8" y="5" width="5" height="6" rx="1" fill="white" opacity="0.95"/>
  <rect x="14.5" y="5" width="5" height="6" rx="1" fill="white" opacity="0.95"/>
  <rect x="21" y="5" width="5" height="6" rx="1" fill="white" opacity="0.95"/>

  <!-- Left wing -->
  <rect x="1" y="15" width="7" height="14" rx="1" fill="white" opacity="0.82"/>
  <!-- Left wing battlements -->
  <rect x="1" y="10" width="3" height="6" rx="0.8" fill="white" opacity="0.82"/>
  <rect x="5" y="10" width="3" height="6" rx="0.8" fill="white" opacity="0.82"/>

  <!-- Right wing -->
  <rect x="26" y="15" width="7" height="14" rx="1" fill="white" opacity="0.82"/>
  <!-- Right wing battlements -->
  <rect x="26" y="10" width="3" height="6" rx="0.8" fill="white" opacity="0.82"/>
  <rect x="30" y="10" width="3" height="6" rx="0.8" fill="white" opacity="0.82"/>

  <!-- Door arch -->
  <path d="M14,31 L14,20 Q14,17 17,17 Q20,17 20,20 L20,31Z" fill="black" opacity="0.15"/>

  <!-- Menorah -->
  <g transform="translate(17, 3)">
    <!-- Stem -->
    <rect x="-0.6" y="-4" width="1.2" height="4.5" rx="0.6" fill="white"/>
    <!-- Inner branches -->
    <path d="M0,0 C-1.2,-2.5 -3.5,-4 -5.5,-5" stroke="white" stroke-width="1" fill="none" stroke-linecap="round"/>
    <path d="M0,0 C1.2,-2.5 3.5,-4 5.5,-5" stroke="white" stroke-width="1" fill="none" stroke-linecap="round"/>
    <!-- Outer branches -->
    <path d="M0,0 C-2,-1.5 -6,-2 -10,-2" stroke="white" stroke-width="0.9" fill="none" stroke-linecap="round"/>
    <path d="M0,0 C2,-1.5 6,-2 10,-2" stroke="white" stroke-width="0.9" fill="none" stroke-linecap="round"/>
    <!-- Center flame -->
    <ellipse cx="0" cy="-6.5" rx="1.8" ry="2.2" fill="#FFD54F"/>
    <!-- Inner flames -->
    <ellipse cx="-5.5" cy="-6.8" rx="1.4" ry="1.7" fill="#FFD54F" opacity="0.85"/>
    <ellipse cx="5.5" cy="-6.8" rx="1.4" ry="1.7" fill="#FFD54F" opacity="0.85"/>
    <!-- Outer flames -->
    <ellipse cx="-10" cy="-4" rx="1.2" ry="1.4" fill="#FFD54F" opacity="0.65"/>
    <ellipse cx="10" cy="-4" rx="1.2" ry="1.4" fill="#FFD54F" opacity="0.65"/>
  </g>
</svg>
